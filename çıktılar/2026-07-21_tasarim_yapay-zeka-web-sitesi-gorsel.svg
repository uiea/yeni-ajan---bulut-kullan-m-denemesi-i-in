  <text x="100" y="600" fill="#d4c9b5" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="600">• Hazır sayfa yapısı ile teknik engelleri azaltın</text>
  <text x="100" y="660" fill="#d4c9b5" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="600">• Ürün ve hizmetlerinizi hızla gösterime alın</text>
  <text x="100" y="720" fill="#d4c9b5" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="600">• Zaman, bütçe ve enerji tasarrufu sağlayın</text>
